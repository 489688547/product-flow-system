name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:dependencies
      - run: npm run lint
      - run: npm run check:governance
      - run: npm run check:integrations
      - run: npm run check:environment-capabilities
      - run: npm test
      - run: npm run build
